name: app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  cached_network_image: ^3.3.0
  cloud_firestore: ^6.0.3
  date_format: ^2.0.7
  firebase_auth: ^6.1.1
  firebase_core: ^4.2.0
  firebase_storage: ^13.0.3
  firebase_app_check: ^0.4.1+1
  flutter_screenutil: ^5.9.0
  image_picker: ^1.0.4
  photo_manager: ^3.7.1
  uuid: ^4.5.1
  share_plus: ^12.0.1
  flutter_staggered_grid_view: ^0.7.0
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/icon/vybe_logo.png"

flutter:
  uses-material-design: true
  assets:
    - images/
